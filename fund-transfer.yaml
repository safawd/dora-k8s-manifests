apiVersion: apps/v1
kind: Deployment
metadata:
  name: fund-transfer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fund-transfer
  template:
    metadata:
      labels:
        app: fund-transfer
    spec:
      containers:
        - name: fund-transfer
          image: fund-transfer
          imagePullPolicy: Never
          env:
            - name: MYSQL_HOST
              value: "mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DB_NAME
              value: "fund_transfer_service"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_PASSWORD
              value: ""
            - name: EUREKA_HOST
              value: "service-registry"
          ports:
            - containerPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: fund-transfer
spec:
  selector:
    app: fund-transfer
  ports:
    - port: 8085
      targetPort: 8085
